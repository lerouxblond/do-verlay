name: Bug report
description: Signaler un problème avec l'overlay ou le panel
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description du problème
      placeholder: Que se passe-t-il ?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Étapes pour reproduire
      placeholder: "1. Aller sur...\n2. Cliquer sur...\n3. Voir l'erreur"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: Module concerné
      options:
        - Dofusdex
        - Étendard / Guilde
        - Alliance
        - Fiche perso
        - Almanax
        - Panel général
        - Éditeur de disposition
        - Autre
  - type: input
    id: browser
    attributes:
      label: Navigateur / OBS version
      placeholder: "ex: OBS 31, Chrome 125"
