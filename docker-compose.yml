# Environnement de dev — PostgreSQL pour le backend (différé).
# Copier .env.example en .env et ajuster les valeurs avant de lancer.
# `docker compose up -d` démarre la base ; les migrations vivent dans server/migrations.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-doverlay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?La variable POSTGRES_PASSWORD est requise — copie .env.example en .env}
      POSTGRES_DB: ${POSTGRES_DB:-doverlay}
    ports:
      # Exposé uniquement sur la boucle locale (pas d'accès réseau en dev).
      - '127.0.0.1:5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
      # Les migrations sont jouées par ordre alphabétique au premier démarrage du volume.
      # Si le volume db-data existe déjà, appliquer manuellement : psql < server/migrations/0002_config_snapshot.sql
      - ./server/migrations/0001_init.sql:/docker-entrypoint-initdb.d/0001_init.sql:ro
      - ./server/migrations/0002_config_snapshot.sql:/docker-entrypoint-initdb.d/0002_config_snapshot.sql:ro

volumes:
  db-data:
